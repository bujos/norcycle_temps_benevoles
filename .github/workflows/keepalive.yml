name: Keep Streamlit and Supabase alive

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Open Streamlit healthcheck in browser
        run: |
          node <<'EOF'
          const { chromium } = require("playwright");

          (async () => {
            const url = "https://norcycletempsbenevoles.streamlit.app/?health=1";

            const browser = await chromium.launch({ headless: true });

            const page = await browser.newPage({
              userAgent:
                "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"
            });

            console.log("Opening:", url);

            const response = await page.goto(url, {
              waitUntil: "domcontentloaded",
              timeout: 120000
            });

            const status = response ? response.status() : "no response";
            console.log("HTTP status:", status);
            console.log("Initial final URL:", page.url());

            // Laisse le temps à Streamlit de démarrer, ouvrir la session
            // websocket et rendre le contenu. Oui, c'est lent. C'est le cloud.
            await page.waitForTimeout(45000);

            const finalUrl = page.url();
            console.log("Final URL after wait:", finalUrl);

            const bodyText = await page.locator("body").innerText({
              timeout: 60000
            }).catch(() => "");

            console.log("Page text preview:");
            console.log(bodyText.slice(0, 1500));

            if (
              finalUrl.includes("/login") ||
              finalUrl.includes("share.streamlit.io/-/auth")
            ) {
              throw new Error(
                "Streamlit redirected to an auth/login page. The app is not reachable anonymously."
              );
            }

            // On préfère trouver OK, mais on ne tue pas le keepalive si Streamlit
            // ne met pas le texte dans le DOM assez vite. Le navigateur a quand même
            // visité l'app, ce qui est l'objectif pratique ici.
            if (
              bodyText.includes("OK") ||
              bodyText.includes("Healthcheck réussi")
            ) {
              console.log("Healthcheck text found.");
            } else {
              console.log(
                "Healthcheck text not found, but page was opened without auth redirect."
              );
            }

            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          EOF
