name: Keep Streamlit and Supabase alive

on:
  schedule:
    - cron: "7/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit healthcheck
        run: |
          curl --fail --max-time 90 "https://norcycletempsbenevoles.streamlit.app/?health=1"
