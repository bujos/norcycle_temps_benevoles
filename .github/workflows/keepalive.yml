name: Keep Streamlit and Supabase alive

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit healthcheck
        run: |
          curl --fail --max-time 90 --user-agent "Mozilla/5.0 GitHub-Actions-Keepalive" "https://norcycletempsbenevoles.streamlit.app/?health=1"
