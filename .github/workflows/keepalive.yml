name: Keep Streamlit and Supabase alive

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Open Streamlit healthcheck in browser
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const url = "https://norcycletempsbenevoles.streamlit.app/?health=1";

            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              userAgent: "Mozilla/5.0 GitHub-Actions-Keepalive"
            });

            console.log("Opening:", url);

            const response = await page.goto(url, {
              waitUntil: "networkidle",
              timeout: 120000
            });

            console.log("HTTP status:", response ? response.status() : "no response");
            console.log("Final URL:", page.url());

            await page.waitForTimeout(10000);

            const bodyText = await page.locator("body").innerText({
              timeout: 60000
            });

            console.log("Page text preview:");
            console.log(bodyText.slice(0, 1000));

            if (
              !bodyText.includes("OK") &&
              !bodyText.includes("Healthcheck réussi")
            ) {
              throw new Error("Healthcheck text not found in rendered page.");
            }

            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          EOF
