name: Keep Streamlit and Supabase alive

on:
  schedule:
    - cron: "15 10 * * *"
    - cron: "15 22 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit healthcheck
        run: |
          curl --fail --max-time 90 --user-agent "Mozilla/5.0 GitHub-Actions-Keepalive" "${{ secrets.STREAMLIT_APP_URL }}/?health=1"
